    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Noto Sans TC"', 'sans-serif'], serif: ['"Playfair Display"', '"Noto Serif TC"', 'serif'] },
                    colors: { tarot: { dark: '#070913', navy: '#0D0F1F', gold: '#D4AF37', lightGold: '#F3E5AB', purple: '#6B4C9A', wine: '#2D1B22' } }
                }
            }
        }
    </script>

    <style>
        body { background-color: #070913; color: #E2E8F0; -webkit-font-smoothing: antialiased; overflow-x: hidden; background-image: radial-gradient(circle at 10% 20%, rgba(107, 76, 154, 0.2), transparent 40%), radial-gradient(circle at 90% 80%, rgba(45, 27, 34, 0.3), transparent 40%); }
        .tarot-card { background: rgba(13, 15, 31, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(212, 175, 55, 0.15); transition: all 0.4s ease; position: relative; }
        .tarot-card:hover { transform: translateY(-5px); border-color: rgba(212, 175, 55, 0.5); box-shadow: 0 0 30px rgba(212, 175, 55, 0.1); }
        .text-gold-gradient { background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tab-content { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .stardust { position: absolute; background: white; border-radius: 50%; opacity: 0.3; animation: twinkle var(--d) infinite alternate; pointer-events: none; }
        @keyframes twinkle { from { opacity: 0.1; } to { opacity: 0.6; } }
        .nav-btn.active { color: #D4AF37; border-bottom: 2px solid #D4AF37; }
        .image-gradient-mask { mask-image: linear-gradient(to bottom, black 70%, transparent 100%); -webkit-mask-image: linear-gradient(to right, black 60%, transparent 100%); }
        @media (max-width: 768px) { .image-gradient-mask { -webkit-mask-image: linear-gradient(to bottom, black 70%, transparent 100%); } }
        .subitem-scroll::-webkit-scrollbar { width: 4px; } .subitem-scroll::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.3); border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen font-sans">

    <!-- 背景星塵 -->
    <div class="fixed inset-0 pointer-events-none -z-10">
        <div class="stardust w-1 h-1 top-1/4 left-1/4" style="--d: 3s"></div>
        <div class="stardust w-1 h-1 top-1/3 left-3/4" style="--d: 5s"></div>
        <div class="stardust w-1.5 h-1.5 top-2/3 left-1/2" style="--d: 4s"></div>
    </div>

    <!-- 導覽列 -->
    <nav class="sticky top-0 z-40 bg-tarot-dark/90 backdrop-blur-md border-b border-tarot-gold/10">
        <div class="max-w-6xl mx-auto px-5 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-tarot-gold rounded flex items-center justify-center"><i data-lucide="moon" class="w-4 h-4 text-tarot-dark"></i></div>
                <span class="font-serif font-bold text-tarot-lightGold uppercase tracking-tighter">Akane's Lab</span>
            </div>
            <div class="hidden md:flex gap-8 text-sm font-serif tracking-widest text-gray-400">
                <button onclick="switchTab('overview')" class="nav-btn hover:text-tarot-gold transition-colors">序章</button>
                <button onclick="switchTab('pricing')" class="nav-btn hover:text-tarot-gold transition-colors">牌陣</button>
                <button onclick="switchTab('process')" class="nav-btn hover:text-tarot-gold transition-colors">戒律</button>
            </div>
            <button onclick="toggleMobileMenu()" class="md:hidden text-tarot-gold"><i data-lucide="menu"></i></button>
        </div>
    </nav>

    <!-- 手機版選單 -->
    <div id="mobile-menu" class="fixed inset-0 bg-tarot-dark/95 backdrop-blur-md z-50 hidden flex-col items-center justify-center gap-8 text-2xl font-serif opacity-0 transition-opacity">
        <button onclick="toggleMobileMenu()" class="absolute top-5 right-5"><i data-lucide="x" class="w-8 h-8 text-tarot-gold"></i></button>
        <button onclick="switchTab('overview'); toggleMobileMenu()" class="text-tarot-gold hover:scale-110 transition-transform">序章：起源</button>
        <button onclick="switchTab('pricing'); toggleMobileMenu()" class="text-tarot-gold hover:scale-110 transition-transform">牌陣：契約</button>
        <button onclick="switchTab('process'); toggleMobileMenu()" class="text-tarot-gold hover:scale-110 transition-transform">戒律：規範</button>
    </div>

    <!-- 主內容區 -->
    <main class="max-w-6xl mx-auto px-5 py-12">
        <div class="text-center mb-16">
            <div class="inline-block p-4 border border-tarot-gold/30 rotate-45 mb-10 transition-transform hover:scale-110"><i data-lucide="sparkles" class="w-8 h-8 text-tarot-gold -rotate-45"></i></div>
            <h1 id="render-brandName" class="text-4xl md:text-6xl font-serif font-bold text-gold-gradient mb-4"></h1>
            <p id="render-subtitle" class="text-gray-400 font-serif tracking-widest text-sm md:text-base"></p>
        </div>

        <!-- 分頁內容由 JS 動態渲染 -->
        <div id="tab-overview" class="tab-content space-y-12">
            <div class="tarot-card p-8 md:p-12 rounded-lg text-center relative overflow-hidden">
                <h2 class="text-2xl font-serif text-tarot-gold mb-6 tracking-widest uppercase">擅長領域</h2>
                <div id="render-specialties" class="flex flex-wrap justify-center gap-3"></div>
            </div>
            <div class="grid md:grid-cols-2 gap-8">
                <div class="tarot-card p-8 rounded-lg border-l-4 border-l-tarot-purple"><h3 class="text-lg font-serif text-tarot-lightGold mb-4 uppercase tracking-widest">核心介紹</h3><p id="render-intro" class="text-gray-400 leading-relaxed text-sm">這裡是茜子的數位工作室。我專注於打造具備「靈魂」的虛擬形象與各種數位素材原型。<br><br>透過高階算力的極致頻率，我將您的想像碎片重新編碼，實體化為具備生命力與細節的視覺呈現。</p></div>
                <div class="tarot-card p-8 rounded-lg border-l-4 border-l-tarot-wine"><h3 class="text-lg font-serif text-tarot-lightGold mb-4 uppercase tracking-widest">好友優惠</h3><p class="text-gray-400 text-sm leading-relaxed">臉書友列享有每 2 個月 1 次的不限品項 <span class="text-tarot-gold font-bold">5 折優惠</span>（須主動提出，僅限當前帳號）。</p></div>
            </div>
        </div>

        <div id="tab-pricing" class="tab-content hidden space-y-10">
            <div id="render-commissions" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            <div class="tarot-card p-8 bg-tarot-wine/10 border-tarot-wine/30"><h3 class="text-xl font-serif text-tarot-pink uppercase tracking-widest mb-4">自帶價 (鈔能力)</h3><p class="text-sm text-gray-400 leading-relaxed font-light">已有底價品項 ➔ 底價 × 1.5 ~ 2<br>尚未定價品項 ➔ 請直接提供您的預算。若無預算詢問恕不回覆。</p></div>
        </div>

        <div id="tab-process" class="tab-content hidden space-y-8">
            <div class="grid md:grid-cols-2 gap-8">
                <div class="space-y-6"><h3 class="text-xl font-serif text-tarot-gold uppercase tracking-widest flex items-center gap-2"><i data-lucide="scroll" class="w-5 h-5"></i> 委託流程</h3><div id="render-process" class="space-y-4"></div></div>
                <div class="space-y-6"><h3 class="text-xl font-serif text-tarot-gold uppercase tracking-widest flex items-center gap-2"><i data-lucide="alert-circle" class="w-5 h-5"></i> 注意事項</h3><div id="render-notices" class="space-y-3"></div></div>
            </div>
        </div>
    </main>

    <!-- 預覽彈窗 -->
    <div id="previewModal" class="fixed inset-0 bg-tarot-dark/95 backdrop-blur-xl z-[100] hidden items-center justify-center p-4 opacity-0 transition-opacity duration-500">
        <div class="tarot-card max-w-5xl w-full relative transform scale-95 transition-transform duration-500 flex flex-col md:flex-row overflow-hidden shadow-[0_0_50px_rgba(212,175,55,0.15)]" id="previewContent">
            <button onclick="closePreview()" class="absolute top-4 right-4 z-20 w-10 h-10 flex items-center justify-center bg-tarot-dark/80 backdrop-blur rounded-full text-tarot-gold hover:rotate-90 transition-transform border border-tarot-gold/30"><i data-lucide="x" class="w-5 h-5"></i></button>
            <div class="w-full md:w-1/2 h-[200px] md:h-[600px] relative bg-black flex-shrink-0">
                <img id="previewImage" src="" alt="Preview" onerror="this.onerror=null; this.src=this.dataset.fallback;" class="w-full h-full object-cover image-gradient-mask opacity-90 transition-opacity duration-700">
                <div class="absolute inset-4 border border-tarot-gold/20 pointer-events-none"></div>
                <div class="absolute bottom-6 left-6 z-10 bg-tarot-dark/60 p-2 rounded backdrop-blur" id="previewIconWrapper"></div>
            </div>
            <div class="w-full md:w-1/2 p-6 md:p-10 flex flex-col relative overflow-y-auto subitem-scroll max-h-[65vh] md:max-h-[600px]">
                <div id="previewTag" class="text-[10px] font-serif text-tarot-gold/70 tracking-[0.4em] uppercase mb-2"></div>
                <div class="flex items-center justify-between mb-4">
                    <h3 id="previewTitle" class="text-3xl md:text-4xl font-serif text-gray-100 tracking-wide"></h3>
                    <a id="previewNotionBtn" href="#" target="_blank" class="text-tarot-lightGold/60 hover:text-tarot-gold transition-colors text-xs flex items-center gap-1 border border-tarot-gold/20 px-2 py-1 rounded"><i data-lucide="external-link" class="w-3 h-3"></i> Notion</a>
                </div>
                <p id="previewDesc" class="text-sm text-gray-400 leading-relaxed font-light mb-8 italic"></p>
                <div id="previewSubItems" class="space-y-3 flex-grow pb-4"></div>
            </div>
        </div>
    </div>

    <!-- 表單彈窗 -->
    <div id="contractModal" class="fixed inset-0 bg-tarot-dark/95 backdrop-blur-xl z-[110] hidden items-center justify-center p-4 opacity-0 transition-opacity duration-500">
        <div class="tarot-card max-w-lg w-full p-8 md:p-12 relative transform scale-95 transition-transform duration-500" id="contractContent">
            <button onclick="closeForm()" class="absolute top-6 right-6 text-tarot-gold hover:rotate-90 transition-transform"><i data-lucide="x"></i></button>
            <h3 class="text-3xl font-serif text-gold-gradient text-center mb-8 tracking-widest">靈魂締約</h3>
            <form id="commissionForm" method="POST" action="" class="space-y-5">
                <input type="text" name="name" required placeholder="您的稱呼" class="w-full bg-tarot-navy/50 border border-tarot-gold/30 p-3.5 rounded text-tarot-lightGold outline-none focus:border-tarot-gold font-serif">
                <input type="email" name="email" required placeholder="聯繫 Email" class="w-full bg-tarot-navy/50 border border-tarot-gold/30 p-3.5 rounded text-tarot-lightGold outline-none focus:border-tarot-gold font-serif">
                <select name="type" id="form-select" class="w-full bg-tarot-navy border border-tarot-gold/30 p-3.5 rounded text-tarot-lightGold outline-none focus:border-tarot-gold font-serif"></select>
                <textarea name="message" rows="4" required placeholder="請描述您的願景、需求細節、或附上設定資料連結..." class="w-full bg-tarot-navy/50 border border-tarot-gold/30 p-3.5 rounded text-tarot-lightGold outline-none focus:border-tarot-gold font-serif resize-none"></textarea>
                <button type="submit" class="w-full bg-tarot-gold text-tarot-dark font-bold py-4 uppercase tracking-[0.3em] hover:bg-tarot-lightGold transition-all">送出締約請求</button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
        document.getElementById('render-brandName').innerText = siteData.brandName;
        document.getElementById('render-subtitle').innerText = siteData.subtitle;
        document.getElementById('commissionForm').action = siteData.formspreeUrl;

        const specCont = document.getElementById('render-specialties');
        siteData.specialties.forEach(s => { specCont.innerHTML += `<span class="px-4 py-2 bg-tarot-gold/5 border border-tarot-gold/20 rounded-full text-[11px] text-tarot-lightGold tracking-widest font-serif">${s}</span>`; });

        const commCont = document.getElementById('render-commissions');
        const formSelect = document.getElementById('form-select');
        siteData.commissions.forEach(c => {
            commCont.innerHTML += `
                <div class="tarot-card p-8 flex flex-col text-center gap-4 cursor-pointer group hover:-translate-y-2 transition-all duration-300" onclick="openPreview('${c.id}')">
                    <div class="w-12 h-12 mx-auto bg-tarot-dark border border-tarot-gold/40 rounded-full flex items-center justify-center group-hover:scale-110 group-hover:shadow-[0_0_15px_rgba(212,175,55,0.4)] transition-all"><i data-lucide="${c.icon}" class="w-5 h-5 text-tarot-gold"></i></div>
                    <div class="text-[10px] text-tarot-gold/60 tracking-[0.3em] uppercase opacity-70">${c.tag}</div>
                    <h3 class="text-xl font-serif text-gray-100 tracking-wide">${c.title}</h3>
                    <div class="text-tarot-gold font-bold font-serif tracking-widest text-sm uppercase">${c.price}</div>
                    <div class="mt-auto pt-4 opacity-0 group-hover:opacity-100 transition-opacity text-[10px] text-tarot-gold flex items-center justify-center gap-1 uppercase tracking-widest"><i data-lucide="eye" class="w-3 h-3"></i> 展開 ${c.subItems.length} 項牌陣</div>
                </div>`;
            let optGroupHtml = `<optgroup label="[ ${c.title} ]" style="background:#070913; color:#D4AF37;">`;
            c.subItems.forEach(sub => { optGroupHtml += `<option value="${c.title} - ${sub.title}" style="background:#0D0F1F; color:#E2E8F0;">${sub.title} (${sub.price})</option>`; });
            optGroupHtml += `</optgroup>`;
            formSelect.innerHTML += optGroupHtml;
        });

        const procCont = document.getElementById('render-process');
        siteData.process.forEach((p, i) => { procCont.innerHTML += `<div class="flex gap-4 text-sm font-light"><span class="text-tarot-gold font-serif">${i+1}.</span><span class="text-gray-400">${p}</span></div>`; });
        const noteCont = document.getElementById('render-notices');
        siteData.notices.forEach(n => { noteCont.innerHTML += `<div class="flex gap-3 text-[13px] text-gray-500 font-light"><i data-lucide="moon" class="w-3.5 h-3.5 text-tarot-wine flex-shrink-0 mt-0.5"></i>${n}</div>`; });
        lucide.createIcons();

        function switchTab(id) { document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden')); document.getElementById('tab-' + id).classList.remove('hidden'); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        function toggleMobileMenu() { const menu = document.getElementById('mobile-menu'); if(menu.classList.contains('hidden')) { menu.classList.remove('hidden'); menu.classList.add('flex'); setTimeout(() => menu.classList.remove('opacity-0'), 10); } else { menu.classList.add('opacity-0'); setTimeout(() => { menu.classList.add('hidden'); menu.classList.remove('flex'); }, 300); } }

        function openPreview(id) {
            const item = siteData.commissions.find(c => c.id === id);
            if(!item) return;
            const imgElement = document.getElementById('previewImage');
            imgElement.dataset.fallback = item.fallback; imgElement.src = item.image;
            document.getElementById('previewTag').innerText = item.tag;
            document.getElementById('previewTitle').innerText = item.title;
            document.getElementById('previewDesc').innerText = item.desc;
            const notionBtn = document.getElementById('previewNotionBtn');
            if(item.notionLink) { notionBtn.href = item.notionLink; notionBtn.style.display = 'inline-flex'; } else { notionBtn.style.display = 'none'; }
            document.getElementById('previewIconWrapper').innerHTML = `<i data-lucide="${item.icon}" class="w-6 h-6 text-tarot-gold"></i>`;
            const subItemsContainer = document.getElementById('previewSubItems'); subItemsContainer.innerHTML = '';
            item.subItems.forEach(sub => {
                const safeTitle = `${item.title} - ${sub.title}`.replace(/'/g, "\\'");
                subItemsContainer.innerHTML += `<div class="flex flex-col md:flex-row md:items-center justify-between p-4 border border-tarot-gold/10 rounded bg-white/5 hover:bg-white/10 hover:border-tarot-gold/30 transition-colors gap-3 group/item"><div><h4 class="text-tarot-lightGold font-serif text-sm">${sub.title}</h4><p class="text-[11px] text-gray-500 mt-1">${sub.desc}</p></div><div class="flex items-center justify-between md:flex-col md:items-end gap-2"><div class="text-tarot-gold font-bold text-[13px] tracking-wide">${sub.price}</div><button onclick="proceedToForm('${safeTitle}')" class="text-[9px] uppercase tracking-widest text-white bg-tarot-purple/40 hover:bg-tarot-purple px-3 py-2 rounded transition-colors flex items-center gap-1">締約 <i data-lucide="arrow-right" class="w-3 h-3 group-hover/item:translate-x-1 transition-transform"></i></button></div></div>`;
            });
            lucide.createIcons(); 
            const m = document.getElementById('previewModal'), mc = document.getElementById('previewContent');
            m.classList.remove('hidden'); m.classList.add('flex'); void m.offsetWidth; m.classList.add('opacity-100'); mc.classList.remove('scale-95');
        }

        function closePreview() { const m = document.getElementById('previewModal'), mc = document.getElementById('previewContent'); m.classList.remove('opacity-100'); mc.classList.add('scale-95'); setTimeout(() => { m.classList.add('hidden'); m.classList.remove('flex'); }, 500); }
        function proceedToForm(val) { closePreview(); setTimeout(() => { openForm(val); }, 400); }
        function openForm(preselect) { const m = document.getElementById('contractModal'), mc = document.getElementById('contractContent'); if(preselect) { const select = document.getElementById('form-select'); for(let i=0; i<select.options.length; i++) { if(select.options[i].value === preselect) { select.selectedIndex = i; break; } } } m.classList.remove('hidden'); m.classList.add('flex'); void m.offsetWidth; m.classList.add('opacity-100'); mc.classList.remove('scale-95'); }
        function closeForm() { const m = document.getElementById('contractModal'), mc = document.getElementById('contractContent'); m.classList.remove('opacity-100'); mc.classList.add('scale-95'); setTimeout(() => { m.classList.add('hidden'); m.classList.remove('flex'); }, 500); }
    </script>
</body>
</html>
